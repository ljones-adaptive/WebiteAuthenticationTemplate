<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Scalping | Adaptive Realtime Trading{% endblock %}</title>
  <style>
    :root {
      --bg:       #0a0e1a;
      --bg2:      #111827;
      --card:     #1a2235;
      --border:   #1e2d40;
      --text:     #e0e6f0;
      --muted:    #8a9bb5;
      --accent:   #00d4ff;
      --accent2:  #0099bb;
      --danger:   #ef4444;
      --success:  #10b981;
      --warn:     #f59e0b;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page-center {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Nav bar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
    }
    .topbar-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .profile-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--accent);
      color: #0a0e1a;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .profile-btn:hover { background: var(--accent2); text-decoration: none; }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }
    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1.25rem;
    }

    /* Forms */
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input[type=text], input[type=email], input[type=password] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.85; text-decoration: none; }
    .btn-primary  { background: var(--accent);  color: #0a0e1a; }
    .btn-danger   { background: var(--danger);  color: #fff; }
    .btn-warn     { background: var(--warn);    color: #0a0e1a; }
    .btn-ghost    { background: var(--border);  color: var(--text); }
    .btn-full     { width: 100%; }
    .btn-sm       { padding: 0.4rem 0.85rem; font-size: 0.8rem; }

    /* Alerts */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }
    .alert-error   { background: rgba(239,68,68,0.15);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.3); }
    .alert-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
    .alert-info    { background: rgba(0,212,255,0.1);   color: var(--accent);  border: 1px solid rgba(0,212,255,0.25); }

    /* Select */
    select {
      padding: 0.4rem 0.75rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.85rem;
      cursor: pointer;
    }

    /* Profile dropdown */
    .profile-menu { position: relative; }
    .profile-dropdown {
      position: absolute;
      top: calc(100% + 0.6rem);
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      min-width: 190px;
      padding: 0.4rem;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-6px);
      transition: opacity 0.18s ease, transform 0.18s ease, visibility 0.18s;
      z-index: 200;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
    }
    .profile-menu:hover .profile-dropdown {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .profile-dropdown a {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0.8rem;
      border-radius: 7px;
      color: var(--text);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .profile-dropdown a:hover { background: var(--border); text-decoration: none; }
    .profile-dropdown a svg { width:15px; height:15px; flex-shrink:0; opacity:0.7; }
    .dropdown-divider { height:1px; background:var(--border); margin:0.3rem 0; }
    .dropdown-danger { color: var(--danger) !important; }
    .dropdown-danger svg { opacity: 0.85; }

    /* Password toggle */
    .pw-wrap {
      position: relative;
    }
    .pw-wrap input[type=password],
    .pw-wrap input[type=text] {
      padding-right: 2.75rem;
    }
    .pw-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }
    .pw-toggle:hover { color: var(--accent); }
    .pw-toggle svg { width: 18px; height: 18px; }

    /* Utility */
    .mt1 { margin-top: 0.5rem; }
    .mt2 { margin-top: 1rem; }
    .mt3 { margin-top: 1.5rem; }
    .text-muted { color: var(--muted); font-size: 0.875rem; }
    .text-center { text-align: center; }
    .flex { display: flex; }
    .gap1 { gap: 0.5rem; }
    .gap2 { gap: 1rem; }
    .items-center { align-items: center; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<script>
  // Eye SVGs
  const EYE_OPEN = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
  </svg>`;
  const EYE_SHUT = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 012.12-3.364M6.343 6.343A9.956 9.956 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.97 9.97 0 01-1.398 2.655M6.343 6.343L3 3m3.343 3.343l11.314 11.314M9.88 9.88a3 3 0 104.24 4.24M9.88 9.88L14.12 14.12"/>
  </svg>`;

  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.pw-wrap').forEach(wrap => {
      const input = wrap.querySelector('input');
      const btn   = wrap.querySelector('.pw-toggle');
      if (!input || !btn) return;
      btn.innerHTML = EYE_OPEN;
      btn.addEventListener('click', () => {
        const show = input.type === 'password';
        input.type  = show ? 'text' : 'password';
        btn.innerHTML = show ? EYE_SHUT : EYE_OPEN;
        btn.title   = show ? 'Hide password' : 'Show password';
      });
    });
  });
</script>
</body>
</html>
