{% extends 'base.html' %}
{% block title %}Reset Password | Scalping{% endblock %}
{% block body %}
<div class="page-center">
  <div style="width:100%;max-width:400px">
    <div class="card">
      <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:0.5rem">Reset Password</h2>
      <p class="text-muted" style="font-size:0.875rem;margin-bottom:1.5rem">
        Enter and confirm your new password below.
      </p>
      {% if error %}
        <div class="alert alert-error">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label>New Password</label>
          <div class="pw-wrap">
            <input type="password" name="new_password" required>
            <button type="button" class="pw-toggle" title="Show password"></button>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <div class="pw-wrap">
            <input type="password" name="confirm_password" required>
            <button type="button" class="pw-toggle" title="Show password"></button>
          </div>
        </div>
        <button class="btn btn-primary btn-full mt2" type="submit">Reset Password</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
