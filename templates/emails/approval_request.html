<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:-apple-system,sans-serif;background:#f4f4f4;padding:2rem;margin:0">
  <div style="max-width:480px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
    <div style="background:#0a0e1a;padding:1.5rem 2rem">
      <h1 style="color:#00d4ff;font-size:1rem;margin:0;letter-spacing:0.5px">
        Scalping | Adaptive Realtime Trading
      </h1>
    </div>
    <div style="padding:2rem">
      <h2 style="font-size:1rem;color:#111;margin:0 0 1rem">New User Registration</h2>
      <p style="color:#555;font-size:0.9rem;line-height:1.6;margin:0 0 0.5rem">
        A new user has requested access to the platform:
      </p>
      <div style="background:#f8f8f8;border-radius:8px;padding:1rem;margin:1rem 0">
        <p style="margin:0 0 0.25rem;font-size:0.875rem;color:#333">
          <strong>Username:</strong> {{ new_user }}
        </p>
        <p style="margin:0;font-size:0.875rem;color:#333">
          <strong>Email:</strong> {{ new_email }}
        </p>
      </div>
      <p style="color:#555;font-size:0.875rem;margin:0 0 1.5rem">
        Please approve or deny this registration request:
      </p>
      <div style="display:flex;gap:1rem">
        <a href="{{ approve_url }}"
           style="display:inline-block;padding:0.75rem 1.5rem;background:#10b981;color:#fff;
                  border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9rem;margin-right:1rem">
          Approve
        </a>
        <a href="{{ deny_url }}"
           style="display:inline-block;padding:0.75rem 1.5rem;background:#ef4444;color:#fff;
                  border-radius:8px;text-decoration:none;font-weight:600;font-size:0.9rem">
          Deny
        </a>
      </div>
      <p style="color:#999;font-size:0.75rem;margin-top:1.5rem">
        This link will expire in 24 hours.
      </p>
    </div>
  </div>
</body>
</html>
