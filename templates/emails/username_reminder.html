<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body style="font-family:-apple-system,sans-serif;background:#f4f4f4;padding:2rem;margin:0">
  <div style="max-width:480px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
    <div style="background:#0a0e1a;padding:1.5rem 2rem">
      <h1 style="color:#00d4ff;font-size:1rem;margin:0;letter-spacing:0.5px">
        Scalping | Adaptive Realtime Trading
      </h1>
    </div>
    <div style="padding:2rem">
      <h2 style="font-size:1rem;color:#111;margin:0 0 1rem">Your Username</h2>
      <p style="color:#555;font-size:0.9rem;line-height:1.6;margin:0 0 1rem">
        You requested your username. Here it is:
      </p>
      <div style="background:#f8f8f8;border-radius:8px;padding:1rem;margin:0 0 1.5rem;text-align:center">
        <span style="font-size:1.4rem;font-weight:700;color:#0a0e1a;letter-spacing:1px">
          {{ username }}
        </span>
      </div>
      <a href="{{ login_url }}"
         style="display:inline-block;padding:0.75rem 2rem;background:#00d4ff;color:#0a0e1a;
                border-radius:8px;text-decoration:none;font-weight:700;font-size:0.9rem">
        Log In
      </a>
      <p style="color:#999;font-size:0.75rem;margin-top:1.5rem">
        If you did not request this, you can safely ignore this email.
      </p>
    </div>
  </div>
</body>
</html>
